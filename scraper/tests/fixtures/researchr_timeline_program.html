<!doctype html>
<html>
  <body>
    <div
      class="hidable"
      data-facet-track="FSE Research Papers"
      data-facet-date="Mon 6 Jul 2026"
      data-slot-id="timeline-slot"
      data-facet-room="Room A"
    >
      <div class="band hour-10">
        <a data-event-modal="timeline-event" href="#">
          <div class="timeline-elem event-elem track-color c1">
            <span data-event-star="timeline-event"><span class="glyphicon glyphicon-star-empty"></span></span>
            <div><strong>FSE Research Papers</strong></div>
            <div>Short timeline title</div>
          </div>
        </a>
        <div class="small clearfix"><span class="pull-left">10:00 - 10:15</span></div>
      </div>
    </div>

    <div id="event-modal-loader">
      <form name="form_modal" id="form_modal" action="https://conf.researchr.org/eventDetailsModalByAjaxConferenceEdition" method="POST">
        <a id="load-modal-action" submitid="modal_action"></a>
        <input type="hidden" name="context" value="fse-2026" />
        <input type="hidden" class="event-id-input" name="event_field" value="" />
      </form>
    </div>
  </body>
</html>
